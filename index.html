<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Practice Timer</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: row;
      min-height: 100vh;
      background: #121212;
      color: #e0e0e0;
    }

    .main-container {
      flex: 1;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      margin-bottom: 20px;
      width: 100%;
      max-width: 700px;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .inputs {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .inputs label {
      font-size: 0.85rem;
      color: #b0b0b0;
    }

    .inputs input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }

    .inputs input:focus {
      border-color: #1e90ff;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 120px;
      margin-left: 30px;
    }

    .buttons button {
      width: 100%;
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #startBtn { background: #1e90ff; color: #fff; }
    #pauseBtn { background: #ff9800; color: #fff; }
    #resumeBtn { background: #4caf50; color: #fff; }
    #doneBtn { background: #e53935; color: #fff; }

    button:disabled {
      background: #2a2a2a;
      color: #666;
      cursor: not-allowed;
      filter: blur(0.5px) brightness(0.7);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.15);
    }

    .timer-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #timerDisplay {
      font-size: 2rem;
      font-weight: bold;
      color: #1e90ff;
    }

    #savedTimeDisplay {
      font-weight: bold;
      color: #1e90ff;
      font-size: 0.9rem;
    }

    #questionDisplay {
      font-size: 1rem;
      margin: 0 0 8px 0;
    }

    .image-container img {
      width: 200px; /* increased image size */
      border-radius: 12px;
      border: 1px solid #2a2a2a;
    }

    #notes {
      width: 320px;
      background: #181818;
      border-left: 1px solid #2a2a2a;
      padding: 20px;
      display: flex;
      flex-direction: column;
      max-width: 100%;
      box-sizing: border-box;
    }

    #notes h2 {
      font-size: 1.2rem;
      color: #1e90ff;
      text-align: center;
      margin-top: 0;
    }

    #notes textarea {
      flex: 1;
      resize: none;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      body { flex-direction: column; }

      #notes {
        width: 100%;
        max-width: 100%;
        border-left: none;
        border-top: 1px solid #2a2a2a;
        height: 200px;
      }

      .card {
        flex-direction: column;
        align-items: stretch;
      }

      .inputs, .buttons {
        width: 100%;
        margin-left: 0;
      }

      .buttons {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
      }

      .buttons button {
        flex: 1 1 45%;
        min-width: 100px;
      }

      /* Timer section stays row always */
      .timer-section {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }

      .image-container img {
        width: 160px; /* bigger on small screens */
      }

      #timerDisplay {
        font-size: 1.8rem;
      }

      #questionDisplay {
        font-size: 0.95rem;
      }

      #savedTimeDisplay {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <h1>Dynamic Practice Timer</h1>

    <!-- Setup card -->
    <div class="card">
      <div class="inputs">
        <label for="numQuestions">Questions</label>
        <input type="number" id="numQuestions" min="1" value="20">
        <label for="totalTime">Time (m)</label>
        <input type="number" id="totalTime" min="1" value="240">
      </div>
      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="doneBtn" disabled>Done</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="resumeBtn" disabled>Resume</button>
      </div>
    </div>

    <!-- Timer card with image -->
    <div class="card timer-section">
      <div class="timer-info">
        <div id="questionDisplay">Question 1 of 20</div>
        <div id="timerDisplay">00:00</div>
        <div id="savedTimeDisplay">Time Saved: 00:00</div>
      </div>
      <div class="image-container">
        <img src="iitd.png" alt="IIT Delhi">
      </div>
    </div>
  </div>

  <!-- Notes -->
  <div id="notes">
    <h2>Notes</h2>
    <textarea placeholder="note here..."></textarea>
  </div>

  <script>
    let totalQuestions, totalTime, currentQuestion = 0;
    let perQuestionTime = 0, questionTime = 0;
    let timerInterval;
    let isPaused = false;
    let totalSaved = 0;

    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const doneBtn = document.getElementById('doneBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const savedTimeDisplay = document.getElementById('savedTimeDisplay');

    function formatTime(seconds) {
      const sign = seconds < 0 ? "-" : "";
      const absSec = Math.abs(seconds);
      const mins = Math.floor(absSec / 60);
      const secs = absSec % 60;
      return `${sign}${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function updateSavedDisplay() {
      savedTimeDisplay.textContent = `Time Saved: ${formatTime(totalSaved)}`;
    }

    function startQuestionTimer() {
      questionDisplay.textContent = `Question ${currentQuestion + 1} of ${totalQuestions}`;
      timerDisplay.textContent = formatTime(questionTime);
      doneBtn.disabled = false;

      timerInterval = setInterval(() => {
        if (!isPaused) {
          questionTime--;
          timerDisplay.textContent = formatTime(questionTime);
          if (questionTime <= 0) {
            clearInterval(timerInterval);
            totalSaved += questionTime;
            updateSavedDisplay();
            nextQuestion();
          }
        }
      }, 1000);
    }

    function nextQuestion() {
      clearInterval(timerInterval);
      doneBtn.disabled = true;
      currentQuestion++;
      if (currentQuestion < totalQuestions) {
        questionTime = perQuestionTime;
        startQuestionTimer();
      } else {
        questionDisplay.textContent = "Practice session completed!";
        timerDisplay.textContent = "00:00";
        pauseBtn.disabled = true;
        resumeBtn.disabled = true;
        doneBtn.disabled = true;
      }
    }

    startBtn.addEventListener('click', () => {
      totalQuestions = parseInt(document.getElementById('numQuestions').value);
      totalTime = parseInt(document.getElementById('totalTime').value) * 60;
      currentQuestion = 0;
      perQuestionTime = Math.floor(totalTime / totalQuestions);
      questionTime = perQuestionTime;
      totalSaved = 0;
      isPaused = false;

      startBtn.disabled = true;
      pauseBtn.disabled = false;
      resumeBtn.disabled = true;
      doneBtn.disabled = false;
      updateSavedDisplay();

      startQuestionTimer();
    });

    pauseBtn.addEventListener('click', () => {
      isPaused = true;
      pauseBtn.disabled = true;
      resumeBtn.disabled = false;
      const breakInterval = setInterval(() => {
        totalSaved--;
        updateSavedDisplay();
      }, 1000);
      resumeBtn.addEventListener('click', () => clearInterval(breakInterval), { once: true });
    });

    resumeBtn.addEventListener('click', () => {
      isPaused = false;
      pauseBtn.disabled = false;
      resumeBtn.disabled = true;
    });

    doneBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      totalSaved += questionTime;
      updateSavedDisplay();
      nextQuestion();
    });

    window.addEventListener("beforeunload", function (e) {
      e.preventDefault();
      e.returnValue = "";
    });
  </script>
</body>
</html>
